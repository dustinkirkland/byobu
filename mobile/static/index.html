<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Trustmux</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/trustmux.svg" type="image/svg+xml">
  <link rel="icon" href="/icons/icon-192.png" type="image/png">
  <meta name="theme-color" content="#141414">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Trustmux">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #141414;
      --bg2:      #1e1e1e;
      --bg3:      #282828;
      --border:   #333;
      --text:     #d4d4d4;
      --dim:      #666;
      --accent:   #4e9de0;
      --green:    #4ec94e;
      --amber:    #e0a040;
      --red:      #e05050;
      --font:     'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 13px;
    }

    /* ── layout ──
       position:fixed + inset:0 is the most reliable way to fill exactly
       the viewport on Android standalone PWAs — avoids dvh calculation
       issues and prevents any accidental body scroll. */
    #app {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── header / picker bar ── */
    #header {
      display: flex; flex-direction: column; gap: 6px;
      padding: 8px 10px; background: var(--bg2);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #header-top {
      display: flex; align-items: center; gap: 8px;
    }
    #machine-select {
      background: var(--bg3); color: var(--dim);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 6px; font-size: 11px; font-family: var(--font);
      cursor: pointer; max-width: 140px;
    }
    #machine-select:hover { color: var(--text); }
    #machine-select option { color: var(--text); }

    #btn-install {
      background: var(--accent); color: #fff;
      border: none; border-radius: 4px;
      padding: 4px 9px; font-size: 11px; font-family: var(--font);
      cursor: pointer; flex-shrink: 0; white-space: nowrap;
    }
    #btn-install:active { filter: brightness(0.85); }

    #ios-install-tip {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--bg2); border: 1px solid var(--accent);
      border-radius: 10px; padding: 14px 18px;
      font-size: 13px; color: var(--text); text-align: center;
      max-width: 280px; z-index: 200; box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      line-height: 1.6;
    }
    #ios-install-tip .close-tip {
      display: block; margin-top: 10px; font-size: 11px;
      color: var(--dim); cursor: pointer;
    }
    #header-pickers {
      display: flex; gap: 6px; align-items: center;
    }

    .byobu-logo { height: 22px; width: auto; flex-shrink: 0; opacity: 0.85; }

    /* ── picker groups ── */
    .picker-group { display: flex; gap: 3px; align-items: center; flex: 1; min-width: 0; }
    .picker-group select { flex: 1; min-width: 0; }

    select {
      background: var(--bg3); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 5px 8px; font-size: 12px; font-family: var(--font);
      cursor: pointer;
    }
    select:disabled { opacity: 0.4; cursor: default; }

    /* ── context menu (long press on output) ── */
    #ctx-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
    }
    #ctx-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 6px;
      min-width: 220px; max-width: 280px; width: 78%;
      display: flex; flex-direction: column;
    }
    .ctx-btn {
      background: transparent; color: var(--text);
      border: none; border-radius: 9px;
      padding: 14px 16px; font-size: 15px; font-family: var(--font);
      cursor: pointer; text-align: left; width: 100%;
    }
    .ctx-btn:active { background: var(--bg3); }
    .ctx-sep { height: 1px; background: var(--border); margin: 2px 0; }
    .ctx-danger { color: var(--red); }
    .ctx-dim { color: var(--dim); text-align: center; font-size: 14px; }
    #ctx-confirm-msg { padding: 12px 16px; color: var(--dim); font-size: 13px;
                       font-family: var(--font); text-align: center; }

    .icon-btn {
      background: var(--bg3); color: var(--dim);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 5px 10px; cursor: pointer; font-size: 14px; flex-shrink: 0;
    }
    .icon-btn:active { background: var(--border); }

    /* ── status bar ── */
    #statusbar {
      display: flex; align-items: center; gap: 8px;
      padding: 3px 10px; background: var(--bg2);
      border-bottom: 1px solid var(--border);
      font-size: 11px; color: var(--dim); flex-shrink: 0;
    }
    #status-right {
      margin-left: auto; display: flex; gap: 6px; align-items: center; flex-shrink: 0;
    }
    #hostname-display {
      font-size: 11px; color: var(--accent);
      white-space: nowrap; letter-spacing: 0.03em;
    }
    #header-clock {
      font-size: 11px; color: var(--dim); white-space: nowrap;
    }
    #statusbar .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--dim); flex-shrink: 0;
    }
    #statusbar.connected .dot { background: var(--green); }
    #statusbar.connecting .dot { background: var(--amber); }
    #statusbar.error .dot { background: var(--red); }

    /* ── output area ── */
    #output {
      flex: 1; overflow-y: auto; overflow-x: auto;
      padding: 10px 12px;
      white-space: pre; font-family: var(--font); font-size: 12px;
      line-height: 1.45; color: var(--text);
      /* smooth scroll on mobile; contain stops scroll bleeding to page */
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    #output.placeholder { white-space: normal; color: var(--dim); font-style: italic; }

    /* ── byobu status line ── */
    #statusline {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 10px; background: var(--bg2);
      border-top: 1px solid var(--border); flex-shrink: 0;
      overflow-x: auto; scrollbar-width: none; gap: 6px;
    }
    #statusline::-webkit-scrollbar { display: none; }
    #statusline-left, #statusline-right {
      display: flex; align-items: center; gap: 4px; flex-wrap: nowrap;
    }
    #statusline-right { margin-left: auto; }
    .chip {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; white-space: nowrap; font-family: var(--font);
      letter-spacing: 0.02em;
    }

    /* ── input bar ── */
    #inputbar {
      display: flex; gap: 6px; align-items: flex-end;
      padding: 8px 10px; background: var(--bg2);
      border-top: 1px solid var(--border); flex-shrink: 0;
      /* clear Android home indicator / notch */
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }

    #cmd {
      flex: 1; background: var(--bg3); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 8px 10px; font-size: 13px; font-family: var(--font);
      outline: none; resize: none; line-height: 1.45;
      min-height: 38px; max-height: 160px; overflow-y: auto;
    }
    #cmd:focus { border-color: var(--accent); }
    #cmd:disabled { opacity: 0.4; }
    #cmd::placeholder { color: var(--dim); }

    #btn-send {
      background: var(--accent); color: #fff; border: none;
      border-radius: 4px; padding: 8px 14px; cursor: pointer;
      font-size: 16px; flex-shrink: 0; line-height: 1;
      height: 38px;
    }
    #btn-send:disabled { opacity: 0.3; cursor: default; }
    #btn-send:active:not(:disabled) { filter: brightness(0.85); }


    /* ── pairing overlay ── */
    #pair-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(10,10,10,0.97);
      display: flex; align-items: center; justify-content: center;
    }
    #pair-box {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; padding: 36px 28px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; max-width: 320px; width: 90%;
      text-align: center;
    }
    #pair-box h2 { font-size: 18px; color: var(--accent); letter-spacing: 2px; }
    #pair-prompt { color: var(--dim); font-size: 12px; line-height: 1.55; }
    #pair-code {
      width: 100%; text-align: center;
      background: var(--bg3); color: var(--text);
      border: 2px solid var(--border); border-radius: 8px;
      padding: 12px 8px; font-size: 30px; font-family: var(--font);
      letter-spacing: 0.18em; outline: none;
    }
    #pair-code:focus { border-color: var(--accent); }
    #pair-error { color: var(--red); font-size: 11px; min-height: 14px; }
    #pair-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 11px 0; width: 100%;
      font-size: 15px; font-family: var(--font); cursor: pointer;
    }
    #pair-btn:disabled { opacity: 0.45; cursor: default; }
    #pair-btn:active:not(:disabled) { filter: brightness(0.85); }
  </style>
</head>
<body>

<!-- ── pairing overlay (shown until device is authenticated) ── -->
<div id="pair-overlay" style="display:none">
  <div id="pair-box">
    <a href="https://trustmux.app" target="_blank" rel="noopener" style="display:block">
      <img src="/trustmux.svg" style="height:52px;width:auto;opacity:0.9;" alt="Trustmux">
    </a>
    <h2>Trustmux</h2>
    <p id="pair-prompt">Enter the pairing code<br>shown in the terminal:</p>
    <input id="pair-code" type="text" inputmode="numeric" placeholder="XXX-XXX"
           autocomplete="off" autocorrect="off" autocapitalize="off"
           spellcheck="false" maxlength="7">
    <p id="pair-error"></p>
    <button id="pair-btn">Pair device</button>
  </div>
</div>

<!-- ── long-press context menu ── -->
<div id="ctx-overlay" style="display:none">
  <div id="ctx-box">
    <div id="ctx-main">
      <button class="ctx-btn ctx-danger" id="ctx-kill">✕  Kill pane</button>
      <div class="ctx-sep"></div>
      <button class="ctx-btn" id="ctx-new-pane">⊞  New pane</button>
      <button class="ctx-btn" id="ctx-new-window">+  New window</button>
      <button class="ctx-btn" id="ctx-new-session">+  New session</button>
      <div class="ctx-sep"></div>
      <button class="ctx-btn ctx-dim" id="ctx-cancel">Cancel</button>
    </div>
    <div id="ctx-confirm" style="display:none">
      <p id="ctx-confirm-msg"></p>
      <button class="ctx-btn ctx-danger" id="ctx-confirm-yes">Yes, kill it</button>
      <div class="ctx-sep"></div>
      <button class="ctx-btn ctx-dim" id="ctx-confirm-no">Cancel</button>
    </div>
  </div>
</div>

<div id="ios-install-tip" style="display:none">
  Tap the <strong>Share</strong> button&nbsp;⎋ below,<br>
  then <strong>"Add to Home Screen"</strong>
  <span class="close-tip" id="close-tip">Dismiss</span>
</div>

<div id="app">

  <div id="header">
    <div id="header-top">
      <a href="https://trustmux.app" target="_blank" rel="noopener"
         style="display:flex;align-items:center;gap:7px;text-decoration:none;flex-shrink:0;">
        <img src="/trustmux.svg" class="byobu-logo" alt="Trustmux">
        <span style="font-size:15px;color:var(--accent);letter-spacing:2px;">Trustmux</span>
      </a>
      <select id="machine-select" title="Switch machine" style="display:none"></select>
      <button id="btn-install" title="Install as app" style="display:none">+ Install app</button>
      <button class="icon-btn" id="btn-refresh" title="Refresh session list">↺</button>
    </div>
    <div id="header-pickers">
      <div class="picker-group">
        <select id="sel-session" title="Session">
          <option value="">Session…</option>
        </select>
      </div>
      <div class="picker-group">
        <select id="sel-window" title="Window" disabled>
          <option value="">Window…</option>
        </select>
      </div>
      <div class="picker-group">
        <select id="sel-pane" title="Pane" disabled>
          <option value="">Pane…</option>
        </select>
      </div>
    </div>
  </div>

  <div id="statusbar">
    <span class="dot"></span>
    <span id="status-text">connecting…</span>
    <span id="status-right">
      <span id="hostname-display"></span>
      <span id="header-clock"></span>
    </span>
  </div>

  <div id="output" class="placeholder">Select a session → window → pane above.</div>

  <div id="statusline">
    <div id="statusline-left"></div>
    <div id="statusline-right"></div>
  </div>

  <div id="inputbar">
    <textarea id="cmd" rows="2" placeholder="Send keys to pane… (Enter = send, Shift+Enter = newline)"
              autocomplete="off" autocorrect="off" autocapitalize="none"
              spellcheck="false" disabled></textarea>
    <button id="btn-kbd-mode" class="icon-btn" title="Terminal mode — tap to enable spell check">$_</button>
    <button id="btn-send" title="Send" disabled>↵</button>
  </div>

</div>
<script src="/app.js"></script>
</body>
</html>
