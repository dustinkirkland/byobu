<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <defs>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2744"/>
      <stop offset="100%" style="stop-color:#0D1520"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5C3"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Phone body: 84px wide x 160px tall = 1.9:1 ratio -->
  <rect x="31" y="9" width="84" height="162" rx="16"
        fill="url(#phoneGrad)" stroke="url(#strokeGrad)" stroke-width="3"/>

  <!-- Dynamic island pill -->
  <rect x="57" y="18" width="30" height="8" rx="4"
        fill="#0A0E18"/>

  <!-- Home bar -->
  <rect x="60" y="160" width="24" height="4" rx="2"
        fill="#1E2D45"/>

  <!-- $ vertically centered at y=90, top=73, baseline=107 -->
  <text x="43" y="107"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="46" font-weight="700"
        fill="#00E5C3">$</text>

  <!-- cursor block: 4px gap, top=73 height=34 -->
  <rect x="76" y="73" width="22" height="34" rx="3"
        fill="#3B82F6" opacity="0.9"/>

  <!-- wordmark -->
  <text x="135" y="117"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="80" font-weight="700"
        letter-spacing="-2"
        fill="#131B2E">trustmux</text>

</svg>
