[DEFAULT]
upstream-branch = upstream/latest
debian-branch = debian/latest
pristine-tar = False

# DEP-14 branch naming: debian/latest is the Salsa packaging branch;
# upstream/latest tracks imported upstream tarballs on Salsa.
#
# byobu upstream development happens on GitHub master, which also carries
# debian/ for local builds and PPA source packages.  upstream-tree = HEAD
# tells gbp to build the orig tarball from the current HEAD rather than
# hunting for an upstream/latest tag or running uscan.  filter strips
# debian/ so it does not land in the orig tarball.  These options must
# appear in both [buildpackage] and [export-orig] because the Salsa CI
# calls gbp export-orig separately before building.

[buildpackage]
upstream-tree = HEAD
filter = ['debian', '.github', '.gitignore']
filter-pristine-tar = False
sign-tags = False

[export-orig]
upstream-tree = HEAD
filter = ['debian', '.github', '.gitignore']
filter-pristine-tar = False
