name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Upstream version (e.g. 6.14)'
        required: true

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y autoconf automake xz-utils
      - name: Build release tarball
        run: |
          autoreconf -fi
          ./configure
          make dist
      - name: Delete existing release if present
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete ${{ inputs.version }} --yes --cleanup-tag 2>/dev/null || true
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: byobu ${{ inputs.version }}
          files: byobu-*.tar.xz
          generate_release_notes: true
