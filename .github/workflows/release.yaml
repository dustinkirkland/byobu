name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Upstream version (e.g. 6.14)'
        required: true
      revision:
        description: 'Port revision (e.g. 0, 1, 2)'
        required: true
        default: '0'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Verify CI passed on master
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion=$(gh run list --branch master --workflow ci.yaml --limit 1 --json conclusion -q '.[0].conclusion')
          if [ "$conclusion" != "success" ]; then
            echo "Latest CI on master did not pass (status: $conclusion)"
            exit 1
          fi
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y autoconf automake xz-utils
      - name: Build release tarball
        run: |
          autoreconf -fi
          ./configure
          make dist
      - name: Update OpenBSD distinfo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tarball=$(ls byobu-*.tar.xz)
          sha256=$(sha256sum "$tarball" | awk '{print $1}')
          size=$(stat --format=%s "$tarball")
          content=$(printf 'SHA256 (%s) = %s\nSIZE (%s) = %s\n' \
            "$tarball" "$sha256" "$tarball" "$size")
          sha=$(gh api repos/${{ github.repository }}/contents/openbsd/distinfo \
            --jq '.sha' -q)
          gh api repos/${{ github.repository }}/contents/openbsd/distinfo \
            -X PUT \
            -f message="Update OpenBSD distinfo for ${{ inputs.version }}" \
            -f content="$(echo "$content" | base64 -w0)" \
            -f branch=master \
            -f sha="$sha"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: byobu ${{ inputs.version }} (revision ${{ inputs.revision }})
          files: byobu-*.tar.xz
          generate_release_notes: true
