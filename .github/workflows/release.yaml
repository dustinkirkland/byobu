name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Upstream version (e.g. 6.14)'
        required: true
      revision:
        description: 'Port revision (e.g. 0, 1, 2)'
        required: true
        default: '0'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Verify CI passed on master
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion=$(gh run list --branch master --workflow ci.yaml --limit 1 --json conclusion -q '.[0].conclusion')
          if [ "$conclusion" != "success" ]; then
            echo "Latest CI on master did not pass (status: $conclusion)"
            exit 1
          fi
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y autoconf automake xz-utils
      - name: Build release tarball
        env:
          VERSION: ${{ inputs.version }}
          REVISION: ${{ inputs.revision }}
        run: |
          autoreconf -fi
          ./configure
          make dist
          # Rename to include revision
          for f in byobu-*.tar.xz; do
            mv "$f" "byobu-${VERSION}r${REVISION}.tar.xz"
          done
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}r${{ inputs.revision }}
          name: byobu ${{ inputs.version }} (revision ${{ inputs.revision }})
          files: byobu-*.tar.xz
          generate_release_notes: true
