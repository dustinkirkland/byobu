[DEFAULT]
upstream-branch = master
debian-branch = master
pristine-tar = False

# byobu is developed as a single repo (upstream + debian/ together).
# upstream-tree = HEAD tells gbp to build the orig tarball from the
# current HEAD rather than hunting for an upstream/X.Y tag or running
# uscan.  filter strips debian/ so it doesn't land in the orig tarball.
# These options must appear in both [buildpackage] and [export-orig]
# because the Salsa CI calls gbp export-orig separately before building.

[buildpackage]
upstream-tree = HEAD
filter = ['debian', '.github', '.gitignore']
filter-pristine-tar = False
sign-tags = False

[export-orig]
upstream-tree = HEAD
filter = ['debian', '.github', '.gitignore']
filter-pristine-tar = False
